[faqLabel]
other = "Frequently Asked Questions"

[faqWhatIsEA]
other = "What is effective altruism?"

[faqWhatIsEAAnswer]
other = "Effective altruism is a research field and community dedicated to finding the best ways to help others. It uses evidence and careful reasoning to determine the most effective ways to improve the world. This means not just asking \"How can I make a difference?\" but \"How can I make the <em>biggest</em> difference?\""

[faqGetInvolved]
other = "How can I get involved?"

[faqGetInvolvedAnswer]
other = "There are many ways to get started! You could attend one of our events, join an introductory reading group, book a free career chat, or start by visiting <a href=\"https://giveffektivt.dk\">Giv Effektivt</a> to learn about high-impact giving. We welcome people at every stage of their EA journey."

[faqDonate]
other = "Where should I donate?"

[faqDonateAnswer]
other = "We recommend donating through <a href=\"https://giveffektivt.dk\">Giv Effektivt</a>, our Danish sister organization. They follow research from GiveWell and other evaluators to recommend charities that save the most lives per krone donated. You also get Danish tax deductions."

[faqOnlyMoney]
other = "Is EA just about donating money?"

[faqOnlyMoneyAnswer]
other = "Not at all! While effective giving is one important part, EA also encompasses career choice, volunteering, research, and community building. Many people find that choosing the right career is one of the highest-impact decisions they can make. Our career guidance service can help you think through your options."

[mediaCoverage]
other = "Media Coverage"

[chaptersIntro]
other = "Effective Altruism Denmark has active local groups across the country. Find your local community and get involved in events, discussions, and projects near you."
