[faqLabel]
other = "Ofte Stillede Spørgsmål"

[faqWhatIsEA]
other = "Hvad er effektiv altruisme?"

[faqWhatIsEAAnswer]
other = "Effektiv altruisme er et forskningsfelt og fællesskab, der er dedikeret til at finde de bedste måder at hjælpe andre på. Det bruger evidens og omhyggelig ræsonnering til at bestemme de mest effektive måder at forbedre verden på. Det handler ikke bare om at spørge \"Hvordan kan jeg gøre en forskel?\" men \"Hvordan kan jeg gøre den <em>største</em> forskel?\""

[faqGetInvolved]
other = "Hvordan kan jeg blive involveret?"

[faqGetInvolvedAnswer]
other = "Der er mange måder at komme i gang på! Du kan deltage i et af vores arrangementer, tilmelde dig en introduktionslæsegruppe, booke en gratis karrieresnak, eller starte med at besøge <a href=\"https://giveffektivt.dk\">Giv Effektivt</a> for at lære om effektiv donation. Vi byder velkommen til folk på alle trin af deres EA-rejse."

[faqDonate]
other = "Hvor bør jeg donere?"

[faqDonateAnswer]
other = "Vi anbefaler at donere gennem <a href=\"https://giveffektivt.dk\">Giv Effektivt</a>, vores danske søsterorganisation. De følger forskning fra GiveWell og andre evalueringsorganer for at anbefale velgørenhedsorganisationer, der redder flest liv per doneret krone. Du får også dansk skattefradrag."

[faqOnlyMoney]
other = "Handler EA kun om at donere penge?"

[faqOnlyMoneyAnswer]
other = "Slet ikke! Selvom effektiv donation er en vigtig del, omfatter EA også karrierevalg, frivilligt arbejde, forskning og fællesskabsopbygning. Mange oplever, at valg af den rette karriere er en af de beslutninger med størst impact. Vores karrierevejledning kan hjælpe dig med at tænke dine muligheder igennem."

[mediaCoverage]
other = "Mediedækning"

[chaptersIntro]
other = "Effektiv Altruisme Danmark har aktive lokalgrupper over hele landet. Find dit lokale fællesskab og bliv involveret i arrangementer, diskussioner og projekter nær dig."
