[whatIsEA]
other = "What is effective altruism?"

[whatIsEADesc1]
other = "Many of us aspire to make a meaningful impact in the world. Witnessing suffering, injustice, and death prompts us to want to take action. Yet, finding a tangible solution to these issues, and more importantly, implementing it, is not straightforward."

[whatIsEADesc2]
other = "Effective altruism offers a solution to this challenge. It is a research field dedicated to maximizing the impact of our efforts to aid others. By employing rigorous evidence and thoughtful reasoning, effective altruism seeks to address the question of how we can help others most effectively."

