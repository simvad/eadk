[whatIsEA]
other = "Hvad er effektiv altruisme?"

[whatIsEADesc1]
other = "Mange af os ønsker at gøre en meningsfuld forskel i verden. At opleve lidelse, uretfærdighed og død får os til at ville handle. Men at finde en konkret løsning på disse problemer, og ikke mindst at implementere den, er ikke ligetil."

[whatIsEADesc2]
other = "Effektiv altruisme tilbyder en løsning på denne udfordring. Det er et forskningsfelt dedikeret til at maksimere effekten af vores indsats for at hjælpe andre. Ved at anvende grundig evidens og omhyggelig tænkning søger effektiv altruisme at besvare spørgsmålet om, hvordan vi kan hjælpe andre mest effektivt."

