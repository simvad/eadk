<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ "favicon.png" | relURL }}" type="image/png">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ with .Site.Params.theme }}<link rel="stylesheet" href="{{ printf "css/theme-%s.css" . | relURL }}">{{ end }}
  {{ block "head" . }}{{ end }}
</head>
<body class="{{ with .Params.bodyClass }}{{ . }}{{ end }} {{ with .Site.Params.theme }}theme-{{ . }}{{ end }}">
  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "newsletter.html" . }}
  {{ partial "footer.html" . }}

  <a href="{{ .Site.Params.bookChatURL }}" class="floating-cta" aria-label="{{ i18n "bookChat" }}">
    {{ i18n "bookChat" }}
  </a>

  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
